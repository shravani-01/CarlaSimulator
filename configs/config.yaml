# Root Hydra config. Compose with: python -m carla_perception.cli +experiment=...
defaults:
  - data: carla_town10
  - model: yolo_seg
  - eval: default
  - _self_

project: carla-perception
seed: 42
device: cuda          # cuda | cpu
output_dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}

# Weights & Biases (set mode=disabled to run offline)
wandb:
  project: carla-perception
  mode: online         # online | offline | disabled
