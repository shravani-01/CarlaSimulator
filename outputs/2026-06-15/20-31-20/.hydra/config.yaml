data:
  name: carla_town10
  town: Town10HD_Opt
  recordings_dir: data/recordings
  sensors:
    rgb:
      width: 1280
      height: 720
      fov: 90
    depth: true
    semantic: true
    imu: true
    gps: true
  capture:
    fps: 20
    num_frames: 1000
    num_vehicles: 40
    num_walkers: 20
  weather: ClearNoon
model:
  name: yolo_seg
  detection:
    arch: yolo
    weights: yolo11n.pt
    conf_threshold: 0.25
    iou_threshold: 0.7
  segmentation:
    arch: unet
    encoder: resnet34
    num_classes: 23
  tracking:
    arch: bytetrack
    track_thresh: 0.5
    match_thresh: 0.8
eval:
  name: default
  odometry:
    metrics:
    - ate
    - rpe
  segmentation:
    metrics:
    - miou
  detection:
    metrics:
    - map_50
    - map_50_95
  robustness_presets:
  - ClearNoon
  - WetNoon
  - HardRainNoon
  - ClearNight
project: carla-perception
seed: 42
device: cuda
output_dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
wandb:
  project: carla-perception
  mode: online
